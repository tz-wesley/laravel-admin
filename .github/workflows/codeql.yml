name: "CodeQL-Scaner"

on:
  push:
    branches: [ "main", "develop" ]
    # 优化：支持更多格式的 tag，防止因为没有 'v' 开头而不触发
    tags: 
      - '*'          # 匹配所有标签，如 1.0.1 或 v1.0.1
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:  # 允许手动触发
  schedule:
    - cron: '30 1 * * 1'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'php' ]

    steps:
    - name: Checkout repository
      # 优化：更新到最新版本的 checkout
      uses: actions/checkout@v4
      with:
        # 扫描 tag 时，确保获取完整的 git 历史（可选）
        fetch-depth: 0

    # 初始化 CodeQL
    - name: Initialize CodeQL
      # 优化：升级到 v3 版本（GitHub 目前推荐版本）
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # 针对 CVE-2023-24249 的关键设置：
        # 必须使用 security-extended 才能扫描出“不可信的文件操作”
        queries: security-extended,security-and-quality

    - name: Perform CodeQL Analysis
      # 优化：升级到 v3 版本
      uses: github/codeql-action/analyze@v3
      with:
        # 打印详细日志，方便调试为什么没扫出漏洞
        category: "/language:${{matrix.language}}"
